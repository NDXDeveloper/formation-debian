# =============================================================================
# Module 15 — Observabilité et monitoring
# Section 15.3.3 — Multi-cluster : buffering Fluent Bit en cas de coupure WAN
# Fichier : /etc/fluent-bit/fluent-bit.conf — extrait OUTPUT vers Loki
# Licence : CC BY 4.0
# =============================================================================
# En topologie hub-and-spoke, les agents bufferisent sur disque pour
# survivre aux coupures réseau prolongées entre sites.
#
# storage.total_limit_size 5G : 5 Go de buffer disque max — dimensionner
# selon la durée maximale de coupure attendue × débit logs.
#
# Retry_Limit False = retry infini (acceptable car le buffer est borné par
# storage.total_limit_size).
# =============================================================================

[OUTPUT]
    Name          loki
    Match         *
    Host          loki-central.example.com
    Port          3100
    storage.type  filesystem
    storage.path  /var/lib/fluent-bit/buffer/
    storage.sync  normal
    storage.total_limit_size 5G
    Retry_Limit   False
