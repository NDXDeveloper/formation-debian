# =============================================================================
# Module 15 — Observabilité et monitoring
# Section 15.3.4 — Fluent Bit lisant journald
# Fichier : /etc/fluent-bit/fluent-bit.conf — extrait journald
# Licence : CC BY 4.0
# =============================================================================
# Plugin systemd de Fluent Bit pour lire journald.
# Strip_Underscores On supprime les underscores initiaux des champs
# (`_SYSTEMD_UNIT` devient `SYSTEMD_UNIT`).
# DB conserve le curseur de position pour reprise sans perte/duplication.
# Systemd_Filter limite la collecte aux unités pertinentes (réduit volume
# et cardinalité des labels en aval).
# =============================================================================

[INPUT]
    Name            systemd
    Tag             journal.*
    Path            /var/log/journal
    Read_From_Tail  On
    Strip_Underscores On
    DB              /var/lib/fluent-bit/journal.db

    Systemd_Filter  _SYSTEMD_UNIT=nginx.service
    Systemd_Filter  _SYSTEMD_UNIT=postgresql.service
    Systemd_Filter  _SYSTEMD_UNIT=sshd.service
    Systemd_Filter  _SYSTEMD_UNIT=orders-api.service
    Systemd_Filter  _SYSTEMD_UNIT=containerd.service

[FILTER]
    Name            modify
    Match           journal.*
    Rename          SYSTEMD_UNIT  unit
    Rename          PRIORITY      priority
    Rename          SYSLOG_IDENTIFIER syslog_id
    Rename          MESSAGE       message
    Remove          _CURSOR
    Remove          _SOURCE_REALTIME_TIMESTAMP
    Remove          _BOOT_ID
