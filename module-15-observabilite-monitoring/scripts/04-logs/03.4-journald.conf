# =============================================================================
# Module 15 — Observabilité et monitoring
# Section 15.3.4 — Intégration journald
# Fichier : /etc/systemd/journald.conf — production Debian Trixie
# Licence : CC BY 4.0
# =============================================================================
# Configuration journald optimisée pour un serveur Debian de production
# avec centralisation des logs (vers Loki ou ELK) :
#   - Storage=persistent : crée /var/log/journal/ et garde au reboot
#   - SystemMaxUse=2G    : buffer suffisant pour rattraper une coupure agent
#   - ForwardToSyslog=no : rsyslog désactivé (agent lit journald directement)
#   - MaxRetentionSec=1month : rotation explicite
#
# Application : sudo systemctl restart systemd-journald
# Vérification : journalctl --disk-usage && journalctl --verify
# =============================================================================

[Journal]
# === Stockage ===
Storage=persistent
Compress=yes

# === Limites de taille ===
SystemMaxUse=2G
SystemKeepFree=1G
SystemMaxFileSize=128M

# === Rate limiting ===
# Au-delà de 10 000 messages en 30s, journald supprime les excédents
# et insère « Suppressed N messages ». Pour un service très verbeux,
# augmenter la limite ou la désactiver via override d'unité.
RateLimitIntervalSec=30s
RateLimitBurst=10000

# === Forwarding ===
# Désactiver le forwarding vers rsyslog : journald est la source unique,
# l'agent (Alloy/Fluent Bit) lit journald directement.
ForwardToSyslog=no
ForwardToConsole=no
ForwardToWall=yes

# === Rétention ===
MaxRetentionSec=1month
SystemMaxFiles=100
