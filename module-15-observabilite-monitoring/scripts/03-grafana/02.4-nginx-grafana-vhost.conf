# =============================================================================
# Module 15 — Observabilité et monitoring
# Section 15.2.4 — Grafana : reverse proxy Nginx
# Fichier : /etc/nginx/sites-available/grafana
# Licence : CC BY 4.0
# =============================================================================
# Reverse proxy Nginx pour Grafana avec TLS Let's Encrypt.
# Le bloc /api/live/ est essentiel : il gère les WebSockets utilisés par
# Grafana pour le live streaming (alertes en temps réel, exemplars, etc.).
# Sans ce bloc, l'UI fonctionne mais les fonctionnalités temps réel échouent.
# =============================================================================

server {
    listen 443 ssl http2;
    server_name grafana.example.com;

    ssl_certificate /etc/letsencrypt/live/grafana.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grafana.example.com/privkey.pem;

    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Support des WebSockets (pour le live streaming)
    location /api/live/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
