# =============================================================================
# Module 15 — Observabilité et monitoring
# Section 15.4.3 — OpenTelemetry Collector : configuration unifiée
# Fichier : /etc/otelcol-contrib/config.yaml
# Licence : CC BY 4.0
# =============================================================================
# Configuration Collector v0.151+ (distribution contrib) :
#   - 4 receivers (otlp, prometheus, filelog, journald)
#   - 5 processors (batch, k8sattributes, resourcedetection, attributes, filter)
#   - 4 exporters (otlp/tempo, prometheusremotewrite, otlphttp/loki, debug)
#   - 1 connector (spanmetrics : traces → metrics)
#   - 3 pipelines (traces, metrics, logs)
#
# Notes Collector v0.123+ (RUPTURE par rapport aux versions antérieures) :
#   - service.telemetry.metrics : la clé `address` (raccourci historique) a
#     été remplacée par la configuration `readers` héritée du SDK Go.
#     L'ancien format échoue avec « 'migration.MetricsConfigV030' has invalid
#     keys: address ».
#
# Notes connectors et exporters dépréciés :
#   - L'ancien processor `spanmetricsprocessor` (v0.84-) est remplacé par le
#     CONNECTOR `spanmetrics` (qui se branche en exporter de la pipeline
#     traces et en receiver de la pipeline metrics).
#   - L'exporter `loki` historique est déprécié depuis juillet 2024 — utiliser
#     `otlphttp` qui pousse vers le endpoint /otlp/v1/logs de Loki 3+.
#
# Validation : otelcol-contrib validate --config=config.yaml
# =============================================================================
---
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  prometheus:
    config:
      scrape_configs:
        - job_name: 'otel-collector'
          scrape_interval: 15s
          static_configs:
            - targets: ['localhost:8888']

  filelog:
    include:
      - /var/log/myapp/*.log
    operators:
      - type: json_parser
        timestamp:
          parse_from: attributes.timestamp
          # Layout strptime : %L = millisecondes (3 chiffres), %f = microsecondes
          layout: '%Y-%m-%dT%H:%M:%S.%LZ'
          layout_type: strptime
      - type: severity_parser
        parse_from: attributes.level

  journald:
    units:
      - nginx
      - postgresql
      - sshd
    priority: info

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024
    send_batch_max_size: 2048

  # Enrichissement K8s (uniquement sur nœuds K8s)
  k8sattributes:
    auth_type: "serviceAccount"
    extract:
      metadata:
        - k8s.namespace.name
        - k8s.deployment.name
        - k8s.pod.name
        - k8s.node.name
      labels:
        - tag_name: app
          key: app
          from: pod

  resourcedetection:
    detectors: [env, system]
    system:
      hostname_sources: ["os"]

  attributes:
    actions:
      - key: environment
        value: production
        action: upsert

  # Filtrage des spans non pertinents (health checks)
  filter:
    error_mode: ignore
    traces:
      span:
        - 'attributes["http.route"] == "/healthz"'
        - 'attributes["http.route"] == "/readyz"'
        - 'attributes["http.route"] == "/metrics"'

  # Suppression d'attributs sensibles
  attributes/security:
    actions:
      - key: http.request.header.authorization
        action: delete
      - key: db.statement
        action: hash

connectors:
  # Connector spanmetrics : traces → métriques RED (Rate, Errors, Duration)
  # Branché en exporter de la pipeline traces ET en receiver de la pipeline metrics
  spanmetrics:
    histogram:
      explicit:
        buckets: [5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2.5s, 5s, 10s]
    dimensions:
      - name: http.method
      - name: http.status_code
      - name: http.route
    dimensions_cache_size: 1000
    aggregation_temporality: AGGREGATION_TEMPORALITY_CUMULATIVE

exporters:
  otlp/tempo:
    endpoint: tempo.monitoring.svc:4317
    tls:
      insecure: true    # mTLS ou TLS+CA en production

  # IMPORTANT : Prometheus doit avoir --web.enable-remote-write-receiver
  # (non activé par défaut, même en v3.x). Sans ce flag, /api/v1/write → 404.
  prometheusremotewrite:
    endpoint: http://prometheus.monitoring.svc:9090/api/v1/write
    resource_to_telemetry_conversion:
      enabled: true

  # Loki 3+ supporte OTLP nativement via /otlp
  otlphttp/loki:
    endpoint: http://loki.monitoring.svc:3100/otlp
    tls:
      insecure: true

  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, zpages]

  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resourcedetection, k8sattributes, filter, attributes/security]
      exporters: [otlp/tempo, spanmetrics]

    metrics:
      receivers: [otlp, prometheus, spanmetrics]
      processors: [batch, resourcedetection, k8sattributes]
      exporters: [prometheusremotewrite]

    logs:
      receivers: [otlp, filelog, journald]
      processors: [batch, resourcedetection, k8sattributes]
      exporters: [otlphttp/loki]

  telemetry:
    logs:
      level: info
    # Note Collector v0.123+ : la clé `address` (raccourci historique) a été
    # remplacée par la configuration `readers` héritée de l'OTel SDK Go.
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
