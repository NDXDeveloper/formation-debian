# =============================================================================
# Module 14 — CI/CD et GitOps
# Section 14.4.5 — Gestion des secrets en GitOps
# Fichier : SealedSecret pour les credentials de base de données (staging)
# Licence : CC BY 4.0
# =============================================================================
# IMPORTANT : Les valeurs `encryptedData` ci-dessous sont des PLACEHOLDERS
# tronqués à des fins pédagogiques. Un SealedSecret réel est chiffré avec
# la clé publique d'un cluster spécifique — copier ce fichier tel quel ne
# fonctionnera PAS sur un autre cluster.
#
# Pour générer votre propre SealedSecret :
#   kubectl create secret generic database-credentials \
#     --from-literal=username=myapp \
#     --from-literal=password='s3cr3t-p@ssw0rd' \
#     --namespace staging \
#     --dry-run=client -o yaml > /tmp/secret.yaml
#   kubeseal --format yaml < /tmp/secret.yaml > sealed-secret.yaml
#   rm /tmp/secret.yaml      # Le fichier en clair NE DOIT PAS être commité
# =============================================================================
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: database-credentials
  namespace: staging
spec:
  encryptedData:
    username: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEqXXXXXXXXXXXXXXXXXXXXXXX
    password: AgCtr0sFXE8cEKLB1r5h0qZxw9NQHB5cXXXXXXXXXXXXXXXXXXXXXXX
    connection-string: AgBwQ2N5Fz8cEKL9qZxw9NQHXXXXXXXXXXXXXXXXXXXXXX
  template:
    metadata:
      name: database-credentials
      namespace: staging
    type: Opaque
