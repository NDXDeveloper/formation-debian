# =============================================================================
# Module 14 — CI/CD et GitOps
# Section 14.4.5 — Gestion des secrets en GitOps (External Secrets Operator)
# Fichier : SecretStore — connexion à HashiCorp Vault (ou OpenBao)
# Licence : CC BY 4.0
# =============================================================================
# Le SecretStore définit la connexion au gestionnaire de secrets externe.
# L'authentification Kubernetes utilise un ServiceAccount monté dans le pod
# ESO — Vault valide le JWT du SA et lui octroie un token Vault.
#
# Note Vault ≥ 1.20 : le champ `audiences` est obligatoire (warning en 1.20,
# erreur en 1.21). Compatible avec OpenBao via le même provider `vault`.
# Manifeste en `external-secrets.io/v1` (stable depuis ESO v0.16, requis
# depuis v0.17 qui a supprimé `v1beta1`).
# =============================================================================
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: staging
spec:
  provider:
    vault:
      server: "https://vault.internal.example.com"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: external-secrets-sa
          # Vault ≥ 1.20 émet un warning sans `audiences`,
          # Vault ≥ 1.21 le rend obligatoire
          audiences:
            - vault
