# =============================================================================
# Module 14 — CI/CD et GitOps
# Section 14.4.5 — Gestion des secrets en GitOps (ESO multi-namespace)
# Fichier : ClusterSecretStore — variante cluster-wide
# Licence : CC BY 4.0
# =============================================================================
# Le ClusterSecretStore est accessible depuis tous les namespaces, évitant
# de dupliquer la configuration de connexion. Étant cluster-scoped, le
# `serviceAccountRef` doit explicitement inclure `namespace`.
# =============================================================================
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-global
spec:
  provider:
    vault:
      server: "https://vault.internal.example.com"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets   # Obligatoire pour ClusterSecretStore
          # `audiences` est recommandé depuis Vault 1.20 et obligatoire en Vault 1.21+
          audiences:
            - vault
