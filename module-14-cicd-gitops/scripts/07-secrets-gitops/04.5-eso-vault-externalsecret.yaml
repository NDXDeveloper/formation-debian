# =============================================================================
# Module 14 — CI/CD et GitOps
# Section 14.4.5 — Gestion des secrets en GitOps (External Secrets Operator)
# Fichier : ExternalSecret — récupération depuis Vault avec template
# Licence : CC BY 4.0
# =============================================================================
# L'ExternalSecret référence le SecretStore et déclare quels champs
# récupérer depuis Vault. ESO interroge Vault toutes les `refreshInterval`
# minutes et met à jour le Secret K8s si la valeur a changé — la rotation
# Vault se propage automatiquement, sans aucun commit dans Git.
#
# Le bloc `template:` permet de composer la valeur finale (ici, une
# connection-string PostgreSQL) à partir des champs récupérés. Le moteur
# de templating v2 utilise les fonctions Sprig.
# =============================================================================
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: database-credentials
  namespace: staging
spec:
  refreshInterval: 15m

  secretStoreRef:
    name: vault-backend
    kind: SecretStore

  target:
    name: database-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2     # Moteur de template ESO v2 (Sprig, défaut recommandé)
      type: Opaque
      data:
        connection-string: "postgresql://{{ .username }}:{{ .password }}@db:5432/myappdb"

  data:
    - secretKey: username
      remoteRef:
        key: secret/staging/database     # ESO ajoute automatiquement /data/ pour KV v2
        property: username

    - secretKey: password
      remoteRef:
        key: secret/staging/database
        property: password
