# =============================================================================
# Module 14 — CI/CD et GitOps
# Section 14.4.5 — Gestion des secrets en GitOps (SOPS)
# Fichier : Secret K8s chiffré par SOPS (age) — exemple de structure
# Licence : CC BY 4.0
# =============================================================================
# Format Secret K8s standard avec valeurs chiffrées par SOPS+age.
# Les CLÉS YAML restent en clair (apiVersion, kind, metadata, stringData,
# username, password) — seules les VALEURS sensibles sont chiffrées.
#
# Avantage : le diff de review montre exactement quel champ a changé, même
# si la nouvelle valeur reste opaque.
#
# IMPORTANT : Les blocs ENC[...] et la section sops: ci-dessous sont des
# placeholders illustratifs. Pour générer un vrai fichier :
#   sops --encrypt --in-place overlays/staging/database.secret.yaml
# =============================================================================
---
apiVersion: v1
kind: Secret
metadata:
  name: database-credentials
  namespace: staging
stringData:
  username: ENC[AES256_GCM,data:kWZwbQ==,iv:XXXXXXXX,tag:YYYYYYYY,type:str]
  password: ENC[AES256_GCM,data:N4i/V+2x8FjpEac=,iv:XXXXXXXX,tag:YYYYYYYY,type:str]
sops:
  age:
    - recipient: age1ql3z7hjy54pw3hyww5ayyfg7zqgvc7w3j2elw8zmrj2kg5sfn9aqmcac8p
      enc: |
        -----BEGIN AGE ENCRYPTED FILE-----
        ZGUgYWdlLWVuY3J5cHRpb24ub3JnL3YxCi0tPiBYMjU1MTkgMzVkOWY4
        ...
        -----END AGE ENCRYPTED FILE-----
  lastmodified: "2026-05-01T10:00:00Z"
  mac: ENC[AES256_GCM,data:ZZZZZZZZZZZZ,type:str]
  version: 3.13.0
