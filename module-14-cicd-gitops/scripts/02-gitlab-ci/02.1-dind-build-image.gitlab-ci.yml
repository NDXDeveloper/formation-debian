# =============================================================================
# Module 14 — CI/CD et GitOps
# Section 14.2.1 — GitLab Runner comme service systemd sur Debian
# Fichier : .gitlab-ci.yml — build d'image avec Docker-in-Docker (DinD)
# Licence : CC BY 4.0
# =============================================================================
# Build d'image Docker classique en mode Docker-in-Docker. Nécessite un runner
# configuré avec privileged=true. À réserver aux runners dédiés et isolés —
# pour un build sécurisé sans privilèges, préférer BuildKit rootless
# (cf. 02.3-build-buildkit-rootless.gitlab-ci.yml).
# =============================================================================
---
build:
  image: docker:29
  services:
    - docker:29-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t myapp:${CI_COMMIT_SHORT_SHA} .
    - docker push myapp:${CI_COMMIT_SHORT_SHA}
