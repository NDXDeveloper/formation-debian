# =============================================================================
# Module 14 — CI/CD et GitOps
# Section 14.4.3 — Flux : architecture et configuration
# Fichier : Kustomizations avec dépendances dependsOn
# Licence : CC BY 4.0
# =============================================================================
# Pattern fondamental Flux : déploiement ordonné via dependsOn. La
# Kustomization `applications` ne commence sa réconciliation qu'après que
# `infrastructure` est dans l'état Ready. Garantit que les CRDs, opérateurs
# et services d'infrastructure sont disponibles avant les applications.
# =============================================================================
---
# Infrastructure d'abord (CRDs, ingress, cert-manager, monitoring...)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  sourceRef:
    kind: GitRepository
    name: cluster-config
  path: ./infrastructure
  prune: true
  interval: 10m
---
# Applications après l'infrastructure
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: applications
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure
  sourceRef:
    kind: GitRepository
    name: cluster-config
  path: ./applications
  prune: true
  interval: 10m
