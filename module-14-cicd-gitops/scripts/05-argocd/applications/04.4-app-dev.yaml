# =============================================================================
# Module 14 — CI/CD et GitOps
# Section 14.4.4 — Déploiement multi-environnement
# Fichier : Application ArgoCD pour l'environnement `dev`
# Licence : CC BY 4.0
# =============================================================================
# Pattern « Une Application par environnement » :
#   - dev/staging pointent vers main → déploiement continu
#   - production pointe vers un tag fixe → promotion contrôlée
# Voir aussi 04.4-app-staging.yaml et 04.4-app-production.yaml
# =============================================================================
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp-dev
  namespace: argocd
spec:
  project: team-backend
  source:
    repoURL: https://gitlab.example.com/team/myapp-config.git
    targetRevision: main
    path: overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
