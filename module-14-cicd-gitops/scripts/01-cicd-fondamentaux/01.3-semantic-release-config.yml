# =============================================================================
# Module 14 — CI/CD et GitOps
# Section 14.1.3 — Stratégies de branching et workflows Git
# Fichier : configuration semantic-release pour versioning automatique
# Licence : CC BY 4.0
# =============================================================================
# Configuration semantic-release qui analyse les Conventional Commits depuis
# le dernier tag, détermine le bump SemVer (feat → MINOR, fix → PATCH,
# BREAKING CHANGE → MAJOR), génère le changelog, crée le tag Git et la
# release sur GitLab/GitHub.
#
# Convention attendue dans les messages de commit :
#   <type>(<scope>): <description>
#   types : feat, fix, docs, style, refactor, perf, test, build, ci, chore
# =============================================================================
---
branches:
  - main
  - name: next
    prerelease: true
plugins:
  - "@semantic-release/commit-analyzer"
  - "@semantic-release/release-notes-generator"
  - - "@semantic-release/changelog"
    - changelogFile: CHANGELOG.md
  - - "@semantic-release/git"
    - assets:
        - CHANGELOG.md
        - package.json
      message: "chore(release): ${nextRelease.version} [skip ci]\n\n${nextRelease.notes}"
  - "@semantic-release/gitlab"
