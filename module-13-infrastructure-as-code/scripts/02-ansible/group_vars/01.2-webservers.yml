# =============================================================================
# Module 13 — Infrastructure as Code
# Section 13.1.2 — Inventaires, connexions et variables
# Fichier : inventory/production/group_vars/webservers.yml
# Licence : CC BY 4.0
# =============================================================================
# Variables spécifiques au groupe `webservers`.
# =============================================================================
---
# Configuration Nginx
nginx_worker_processes: auto
nginx_worker_connections: 4096
nginx_keepalive_timeout: 65

# Certificats TLS
tls_cert_path: /etc/ssl/certs
tls_key_path: /etc/ssl/private

# Applicatif
app_deploy_path: /var/www/app
app_user: www-data
app_group: www-data
