# =============================================================================
# Module 19 — Architectures de référence
# Section 19.1.2 — Environnement Kubernetes local
# Fichier : kind-with-ingress.yaml — cluster avec mapping ports 80/443
# Licence : CC BY 4.0
# =============================================================================
# Le label `ingress-ready=true` cible le control-plane comme hôte de
# l'ingress controller. extraPortMappings expose les ports 80/443 du nœud
# Kind directement sur le poste, permettant d'accéder à l'ingress via
# http://localhost (ou http://api.dev.local avec entrée /etc/hosts).
#
# Après création :
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml
# =============================================================================
---
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: dev-ingress
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
