// =============================================================================
// Module 19 — Architectures de référence
// Section 19.2.3 — Services intégrés (Kea DHCP4)
// Fichier : /etc/kea/kea-dhcp4.conf — DHCP avec DDNS vers BIND9
// Licence : CC BY 4.0
// =============================================================================
// Configuration Kea DHCPv4 avec deux sous-réseaux (postes 10.3.0.0/24,
// IoT 10.3.1.0/24) et DDNS activé (les baux DHCP enregistrent
// automatiquement les hostname dans la zone clients.internal.example.com
// via la clé TSIG dhcp-update-key partagée avec BIND9).
//
// Validation : sudo kea-dhcp4 -t /etc/kea/kea-dhcp4.conf
// =============================================================================
{
    "Dhcp4": {
        // Interface d'écoute
        "interfaces-config": {
            "interfaces": ["ens192"],
            "dhcp-socket-type": "raw"
        },

        // Backend de baux (fichier pour commencer, PostgreSQL pour la production)
        "lease-database": {
            "type": "memfile",
            "persist": true,
            "name": "/var/lib/kea/dhcp4.leases",
            "lfc-interval": 3600
        },

        // Durées de bail
        "valid-lifetime": 28800,
        "renew-timer": 14400,
        "rebind-timer": 21600,

        // Options globales
        "option-data": [
            {
                "name": "domain-name-servers",
                "data": "10.0.0.10, 10.0.0.11"
            },
            {
                "name": "domain-name",
                "data": "internal.example.com"
            },
            {
                "name": "domain-search",
                "data": "internal.example.com, clients.internal.example.com"
            },
            {
                "name": "ntp-servers",
                "data": "10.0.0.10"
            }
        ],

        // ─── Sous-réseaux ───
        "subnet4": [
            {
                "id": 1,
                "comment": "Réseau postes de travail",
                "subnet": "10.3.0.0/24",
                "pools": [
                    { "pool": "10.3.0.100 - 10.3.0.250" }
                ],
                "option-data": [
                    {
                        "name": "routers",
                        "data": "10.3.0.1"
                    }
                ],
                "ddns-qualifying-suffix": "clients.internal.example.com",
                "ddns-override-client-update": true,
                "ddns-replace-client-name": "when-not-present",
                "hostname-char-set": "[^A-Za-z0-9.-]",
                "hostname-char-replacement": "-",

                // Réservations statiques (machines fixes)
                "reservations": [
                    {
                        "hw-address": "aa:bb:cc:dd:ee:01",
                        "ip-address": "10.3.0.10",
                        "hostname": "pc-admin"
                    },
                    {
                        "hw-address": "aa:bb:cc:dd:ee:02",
                        "ip-address": "10.3.0.11",
                        "hostname": "imprimante-rdc"
                    }
                ]
            },
            {
                "id": 2,
                "comment": "Réseau IoT / périphériques",
                "subnet": "10.3.1.0/24",
                "pools": [
                    { "pool": "10.3.1.100 - 10.3.1.250" }
                ],
                "option-data": [
                    {
                        "name": "routers",
                        "data": "10.3.1.1"
                    },
                    {
                        "name": "domain-name-servers",
                        "data": "10.0.0.10, 10.0.0.11"
                    }
                ],
                "valid-lifetime": 3600,
                "ddns-qualifying-suffix": "iot.internal.example.com"
            }
        ],

        // Activation du client DDNS
        "dhcp-ddns": {
            "enable-updates": true
        },
        "ddns-send-updates": true,
        "ddns-update-on-renew": true,

        // Journalisation
        "loggers": [
            {
                "name": "kea-dhcp4",
                "output-options": [
                    {
                        "output": "/var/log/kea/kea-dhcp4.log",
                        "maxsize": 10485760,
                        "maxver": 5
                    }
                ],
                "severity": "INFO"
            }
        ]
    }
}
