# =============================================================================
# Module 19 — Architectures de référence
# Section 19.2.1 — Conception on-premise / cloud (lien WireGuard)
# Fichier : /etc/wireguard/wg-cloud.conf — tunnel vers passerelle cloud
# Licence : CC BY 4.0
# =============================================================================
# Tunnel WireGuard depuis le datacenter on-premise vers une instance Debian
# servant de passerelle dans le cloud. Plus léger qu'IPsec, sert de backup
# au lien dédié (Direct Connect/ExpressRoute) ou de lien principal pour les
# sites secondaires.
#
# Génération des clés (à faire une fois sur le serveur) :
#   wg genkey | tee /etc/wireguard/private.key | wg pubkey > /etc/wireguard/public.key
#   chmod 600 /etc/wireguard/private.key
#
# Activation : sudo systemctl enable --now wg-quick@wg-cloud
# =============================================================================

[Interface]
Address = 10.200.0.1/24
PrivateKey = <CLE_PRIVEE_ON_PREMISE>
ListenPort = 51820
# Routage vers le réseau cloud
PostUp = ip route add 172.16.0.0/16 via 10.200.0.2 dev wg-cloud
PostDown = ip route del 172.16.0.0/16

[Peer]
# Instance Debian dans le cloud servant de passerelle WireGuard
PublicKey = <CLE_PUBLIQUE_CLOUD>
Endpoint = cloud-gateway.example.com:51820
AllowedIPs = 10.200.0.2/32, 172.16.0.0/16
PersistentKeepalive = 25
