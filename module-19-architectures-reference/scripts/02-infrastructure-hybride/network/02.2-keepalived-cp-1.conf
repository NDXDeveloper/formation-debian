# =============================================================================
# Module 19 — Architectures de référence
# Section 19.2.2 — Cluster K8s HA Debian (VRRP)
# Fichier : /etc/keepalived/keepalived.conf — nœud cp-1 (MASTER, priority 110)
# Licence : CC BY 4.0
# =============================================================================
# Keepalived utilise VRRP pour élire un nœud maître qui porte la VIP
# 10.2.0.100. Si le maître tombe, cp-2 (priority 105) ou cp-3 (priority 100)
# prend le relais en quelques secondes.
#
# Le script check_haproxy soustrait 20 à la priority si HAProxy n'est plus
# en cours d'exécution → bascule automatique vers le backup.
#
# Validation : keepalived -t -f /etc/keepalived/keepalived.conf
# =============================================================================

global_defs {
    router_id K8S_CP_1
    enable_script_security
    script_user root
}

# Script de vérification : HAProxy est-il opérationnel ?
vrrp_script check_haproxy {
    script "/usr/bin/killall -0 haproxy"
    interval 3
    weight -20
    fall 3
    rise 2
}

vrrp_instance K8S_VIP {
    state MASTER
    interface ens192                # Adapter au nom de l'interface
    virtual_router_id 51
    priority 110                    # Plus haute priorité = maître
    advert_int 1

    authentication {
        auth_type PASS
        # IMPORTANT : auth_pass est tronqué silencieusement à 8 caractères
        # par keepalived (limitation du protocole VRRPv2). Mettre une chaîne
        # de 8 caractères exactement pour éviter toute ambiguïté.
        auth_pass VrrPK8sX                   # Même valeur sur tous les nœuds
    }

    virtual_ipaddress {
        10.2.0.100/24               # La VIP du cluster
    }

    track_script {
        check_haproxy
    }
}
