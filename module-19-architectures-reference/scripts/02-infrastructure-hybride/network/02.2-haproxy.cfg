# =============================================================================
# Module 19 — Architectures de référence
# Section 19.2.2 — Cluster K8s HA Debian (load balancer)
# Fichier : /etc/haproxy/haproxy.cfg — équilibrage API server
# Licence : CC BY 4.0
# =============================================================================
# Configuration identique sur cp-1, cp-2, cp-3. Combinée à Keepalived
# (VRRP, VIP 10.2.0.100), elle fournit un point d'entrée unique HA vers
# les 3 API servers Kubernetes.
#
# Health check : TCP connect sur 6443 ; un API server qui ne répond pas
# pendant 3 × 5s consécutifs (fall 3, inter 5s) est marqué down.
# Validation : haproxy -c -f /etc/haproxy/haproxy.cfg
# =============================================================================

global
    log /dev/log local0
    log /dev/log local1 notice
    maxconn 4096
    daemon

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    timeout connect 5s
    timeout client  50s
    timeout server  50s
    retries 3

# ─── Frontend : point d'entrée de l'API Kubernetes ───
frontend k8s-api
    bind *:6443
    default_backend k8s-api-servers

# ─── Backend : les trois API servers ───
backend k8s-api-servers
    option tcp-check
    balance roundrobin

    server cp-1 10.2.0.10:6443 check fall 3 rise 2 inter 5s
    server cp-2 10.2.0.11:6443 check fall 3 rise 2 inter 5s
    server cp-3 10.2.0.12:6443 check fall 3 rise 2 inter 5s

# ─── Stats (optionnel, utile pour le monitoring) ───
frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if LOCALHOST
