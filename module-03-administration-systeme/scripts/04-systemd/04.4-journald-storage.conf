#
# Nom         : 04.4-journald-storage.conf
# Module      : 3 — Administration système
# Section     : 3.4.4 — journald
# Source      : module-03-administration-systeme/04.4-journald.md
# Description : Drop-in journald pour stockage persistant avec rotation par taille.
# Testé sur   : Debian 13 (Trixie)
# Licence     : CC BY 4.0 — Formation Debian (Nicolas DEOUX)
#
[Journal]
# Espace maximum utilisé par les journaux persistants
SystemMaxUse=2G

# Espace libre minimum à conserver sur la partition
SystemKeepFree=4G

# Taille maximum d'un fichier journal individuel
SystemMaxFileSize=128M

# Nombre maximum de fichiers journaux
SystemMaxFiles=100

# Pour les logs volatiles (/run/log/journal/)
RuntimeMaxUse=256M
RuntimeKeepFree=128M
