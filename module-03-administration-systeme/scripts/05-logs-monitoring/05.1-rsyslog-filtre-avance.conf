# Section     : 3.5.1 — rsyslog vs journald
# Source      : module-03-administration-systeme/05.1-rsyslog-vs-journald.md
# Description : Filtres rsyslog avancés (RainerScript, expressions régulières).
# Testé sur   : Debian 13 (Trixie)
# Licence     : CC BY 4.0 — Formation Debian (Nicolas DEOUX)
#
# Filtrage par expression
if $programname == 'sshd' and $msg contains 'Failed password' then {
    /var/log/ssh-failed.log
    stop
}

# Filtrage par priorité et programme
if $syslogseverity <= 3 and $programname == 'nginx' then {
    action(type="omfile" file="/var/log/nginx/errors.log")
    stop
}

# Filtrage par propriété structurée
if $syslogfacility-text == 'local0' then {
    action(type="omfile"
           file="/var/log/apps/mon-app.log"
           FileCreateMode="0640"
           FileOwner="syslog"
           FileGroup="appgroup")
    stop
}
